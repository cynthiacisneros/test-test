<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camping Escape</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="camping-body">

  <div class="overlay"></div>

  <main class="camping-container">

    <header class="top-bar">
      <p class="location">📍 Mountain Camp</p>
      <p class="time">Golden Hour</p>
    </header>

    <section class="center-content">
      <h1>Take a moment</h1>
      <p class="subtitle">
        You’re sitting outside your tent, the air is cool, and the sky is slowly fading into evening.
      </p>
    </section>

    <section class="bottom-bar">
      <div class="controls">
        <button>🌲 Forest</button>
        <button>🏕️ Camp</button>
        <button>🌊 Lake</button>
      </div>

      <p class="note">breathe. reset. stay a while.</p>
    </section>

  </main>

</body>
</html>
