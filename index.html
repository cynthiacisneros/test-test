<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cozy Desk Escape</title>
    <href:camping.html> </href:camping.html>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="hero-text">
          <p class="eyebrow">a gentle digital reset</p>
          <h1>Welcome to your cozy desk escape</h1>
          <p class="description">
            A soft, calming space designed to feel warm, peaceful, and a little
            removed from the noise of the day.
          </p>
          <a href="#desk-scene" class="button">Enter the space</a>
        </div>

        <div class="desk-wrapper" id="desk-scene">
          <div class="wall-glow"></div>

          <div class="window">
            <div class="window-frame">
              <div class="sky"></div>
              <div class="mountains mountain-back"></div>
              <div class="mountains mountain-front"></div>
              <div class="sun"></div>
            </div>
          </div>

          <div class="shelf">
            <div class="book book-1"></div>
            <div class="book book-2"></div>
            <div class="book book-3"></div>
            <div class="plant-small">
              <span class="pot"></span>
              <span class="leaf leaf-1"></span>
              <span class="leaf leaf-2"></span>
              <span class="leaf leaf-3"></span>
            </div>
          </div>

          <div class="lamp">
            <div class="lamp-shade"></div>
            <div class="lamp-neck"></div>
            <div class="lamp-base"></div>
          </div>

          <div class="desk">
            <div class="monitor">
              <div class="monitor-screen">
                <div class="screen-view"></div>
              </div>
              <div class="monitor-stand"></div>
            </div>

            <div class="mug">
              <div class="steam steam-1"></div>
              <div class="steam steam-2"></div>
              <div class="steam steam-3"></div>
            </div>

            <div class="notebook"></div>
            <div class="phone"></div>

            <div class="plant">
              <span class="pot"></span>
              <span class="leaf leaf-1"></span>
              <span class="leaf leaf-2"></span>
              <span class="leaf leaf-3"></span>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
